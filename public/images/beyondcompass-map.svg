<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="BeyondCompass market map: same axes, mapped">
  <defs>
    <linearGradient id="bcmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1a1a"/>
      <stop offset="1" stop-color="#163030"/>
    </linearGradient>
    <linearGradient id="bcmHi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#bcmBg)"/>

  <!-- Top eyebrow -->
  <g font-family="Helvetica Neue, Arial, sans-serif" fill="#5eead4">
    <text x="60" y="78" font-size="16" font-weight="700" letter-spacing="6">MARKET MAP</text>
    <line x1="60" y1="100" x2="160" y2="100" stroke="#5eead4" stroke-width="2"/>
  </g>

  <!-- 4 col x 5 row grid of partners (20 cells) -->
  <g transform="translate(80 200)">
    <!-- Column labels -->
    <g font-family="Helvetica Neue, Arial, sans-serif" fill="#fbf6ec" font-size="10" font-weight="700" letter-spacing="2" opacity="0.55">
      <text x="80"  y="-16" text-anchor="middle">XB</text>
      <text x="240" y="-16" text-anchor="middle">DOM</text>
      <text x="400" y="-16" text-anchor="middle">DOUYIN</text>
      <text x="560" y="-16" text-anchor="middle">DTC</text>
    </g>
    <!-- Row labels -->
    <g font-family="Helvetica Neue, Arial, sans-serif" fill="#fbf6ec" font-size="10" font-weight="700" letter-spacing="2" opacity="0.55">
      <text x="-12" y="80"  text-anchor="end">BEAUTY</text>
      <text x="-12" y="200" text-anchor="end">F&amp;B</text>
      <text x="-12" y="320" text-anchor="end">FASHION</text>
      <text x="-12" y="440" text-anchor="end">WELL.</text>
      <text x="-12" y="560" text-anchor="end">PET</text>
    </g>

    <!-- Cells -->
    <g>
      <!-- Row 1 (Beauty) -->
      <rect x="0"   y="0"   width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.04" stroke="#fbf6ec" stroke-opacity="0.08"/>
      <rect x="160" y="0"   width="160" height="120" rx="4" fill="url(#bcmHi)" fill-opacity="0.85"/>
      <rect x="320" y="0"   width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.06" stroke="#fbf6ec" stroke-opacity="0.10"/>
      <rect x="480" y="0"   width="160" height="120" rx="4" fill="url(#bcmHi)" fill-opacity="0.55"/>

      <!-- Row 2 (F&B) -->
      <rect x="0"   y="120" width="160" height="120" rx="4" fill="url(#bcmHi)" fill-opacity="0.4"/>
      <rect x="160" y="120" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.04" stroke="#fbf6ec" stroke-opacity="0.08"/>
      <rect x="320" y="120" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.04" stroke="#fbf6ec" stroke-opacity="0.08"/>
      <rect x="480" y="120" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.06" stroke="#fbf6ec" stroke-opacity="0.10"/>

      <!-- Row 3 (Fashion) -->
      <rect x="0"   y="240" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.04" stroke="#fbf6ec" stroke-opacity="0.08"/>
      <rect x="160" y="240" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.06" stroke="#fbf6ec" stroke-opacity="0.10"/>
      <rect x="320" y="240" width="160" height="120" rx="4" fill="url(#bcmHi)" fill-opacity="0.7"/>
      <rect x="480" y="240" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.04" stroke="#fbf6ec" stroke-opacity="0.08"/>

      <!-- Row 4 (Wellness) -->
      <rect x="0"   y="360" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.04" stroke="#fbf6ec" stroke-opacity="0.08"/>
      <rect x="160" y="360" width="160" height="120" rx="4" fill="url(#bcmHi)" fill-opacity="0.30"/>
      <rect x="320" y="360" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.06" stroke="#fbf6ec" stroke-opacity="0.10"/>
      <rect x="480" y="360" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.04" stroke="#fbf6ec" stroke-opacity="0.08"/>

      <!-- Row 5 (Pet) -->
      <rect x="0"   y="480" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.04" stroke="#fbf6ec" stroke-opacity="0.08"/>
      <rect x="160" y="480" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.06" stroke="#fbf6ec" stroke-opacity="0.10"/>
      <rect x="320" y="480" width="160" height="120" rx="4" fill="#fbf6ec" fill-opacity="0.04" stroke="#fbf6ec" stroke-opacity="0.08"/>
      <rect x="480" y="480" width="160" height="120" rx="4" fill="url(#bcmHi)" fill-opacity="0.45"/>
    </g>

    <!-- Recommended marker -->
    <rect x="160" y="0" width="160" height="120" rx="4" fill="none" stroke="#5eead4" stroke-width="2"/>
    <g transform="translate(280 12)">
      <rect width="32" height="14" rx="7" fill="#5eead4"/>
      <text x="16" y="10" font-family="Helvetica Neue, Arial, sans-serif" fill="#0f1a1a" font-size="8" font-weight="700" letter-spacing="1.5" text-anchor="middle">PICK</text>
    </g>
  </g>

  <!-- Caption (top-right) -->
  <g font-family="Helvetica Neue, Arial, sans-serif" fill="#5eead4">
    <text x="740" y="78" font-size="14" font-weight="700" letter-spacing="3" text-anchor="end">SAME AXES</text>
    <text x="740" y="100" font-size="14" font-weight="700" letter-spacing="3" text-anchor="end">SAME COMPARISON</text>
  </g>

  <!-- Footer signature -->
  <g font-family="Helvetica Neue, Arial, sans-serif" fill="#fbf6ec">
    <line x1="60" y1="940" x2="740" y2="940" stroke="#fbf6ec" stroke-opacity="0.10"/>
    <text x="700" y="966" font-size="12" font-weight="700" letter-spacing="3" opacity="0.5" text-anchor="end">CHANNEL · CATEGORY · FOOTPRINT</text>
  </g>
</svg>
