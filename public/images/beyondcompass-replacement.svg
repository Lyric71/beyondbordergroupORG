<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="BeyondCompass replacement: out, then in">
  <defs>
    <linearGradient id="bcrBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0f14"/>
      <stop offset="1" stop-color="#2a1820"/>
    </linearGradient>
    <linearGradient id="bcrHi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#d1234a"/>
    </linearGradient>
    <radialGradient id="bcrGlow" cx="0.5" cy="0.6" r="0.55">
      <stop offset="0" stop-color="#f43f5e" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#bcrBg)"/>
  <rect width="800" height="1000" fill="url(#bcrGlow)"/>

  <!-- Top eyebrow -->
  <g font-family="Helvetica Neue, Arial, sans-serif" fill="#fb7185">
    <text x="60" y="78" font-size="16" font-weight="700" letter-spacing="6">REPLACEMENT</text>
    <line x1="60" y1="100" x2="160" y2="100" stroke="#fb7185" stroke-width="2"/>
  </g>

  <!-- OUT card (top, struck through) -->
  <g transform="translate(140 200)" opacity="0.55">
    <rect width="520" height="180" rx="16" fill="#fbf6ec" fill-opacity="0.05" stroke="#fbf6ec" stroke-opacity="0.20" stroke-dasharray="6 6"/>
    <text x="32" y="48" font-family="Helvetica Neue, Arial, sans-serif" fill="#fbf6ec" font-size="11" font-weight="700" letter-spacing="3" opacity="0.65">CURRENT PARTNER</text>
    <rect x="32" y="76"  width="280" height="18" rx="3" fill="#fbf6ec" fill-opacity="0.55"/>
    <rect x="32" y="108" width="220" height="12" rx="2" fill="#fbf6ec" fill-opacity="0.30"/>
    <rect x="32" y="130" width="160" height="12" rx="2" fill="#fbf6ec" fill-opacity="0.30"/>
    <!-- big diagonal slash -->
    <line x1="0" y1="180" x2="520" y2="0" stroke="url(#bcrHi)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Down arrow -->
  <g transform="translate(400 415)" stroke="url(#bcrHi)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="0" y1="0" x2="0" y2="60"/>
    <path d="M-12 48 L0 60 L12 48"/>
  </g>
  <text x="430" y="455" font-family="Helvetica Neue, Arial, sans-serif" fill="#fb7185" font-size="11" font-weight="700" letter-spacing="4">REPLACE</text>

  <!-- IN card (bottom, highlighted) -->
  <g transform="translate(140 510)">
    <rect width="520" height="200" rx="16" fill="url(#bcrHi)" fill-opacity="0.10" stroke="url(#bcrHi)" stroke-width="2"/>
    <text x="32" y="48" font-family="Helvetica Neue, Arial, sans-serif" fill="#fb7185" font-size="11" font-weight="700" letter-spacing="3">NEW PARTNER · VETTED</text>
    <rect x="32" y="76"  width="320" height="20" rx="3" fill="#fbf6ec"/>
    <rect x="32" y="110" width="240" height="12" rx="2" fill="#fbf6ec" fill-opacity="0.65"/>
    <rect x="32" y="132" width="200" height="12" rx="2" fill="#fbf6ec" fill-opacity="0.65"/>
    <!-- check badge -->
    <g transform="translate(420 70)">
      <circle cx="32" cy="32" r="32" fill="url(#bcrHi)"/>
      <path d="M19 33 L29 43 L46 23" stroke="#fbf6ec" stroke-width="3.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- meta -->
    <rect x="32" y="160" width="80"  height="22" rx="11" fill="#fbf6ec" fill-opacity="0.10"/>
    <rect x="120" y="160" width="100" height="22" rx="11" fill="#fbf6ec" fill-opacity="0.10"/>
    <rect x="228" y="160" width="70"  height="22" rx="11" fill="#fbf6ec" fill-opacity="0.10"/>
  </g>

  <!-- Caption (top-right) -->
  <g font-family="Helvetica Neue, Arial, sans-serif" fill="#fb7185">
    <text x="740" y="78" font-size="14" font-weight="700" letter-spacing="3" text-anchor="end">OUT</text>
    <text x="740" y="100" font-size="14" font-weight="700" letter-spacing="3" text-anchor="end">THEN IN</text>
  </g>

  <!-- Footer signature -->
  <g font-family="Helvetica Neue, Arial, sans-serif" fill="#fbf6ec">
    <line x1="60" y1="940" x2="740" y2="940" stroke="#fbf6ec" stroke-opacity="0.10"/>
    <text x="700" y="966" font-size="12" font-weight="700" letter-spacing="3" opacity="0.5" text-anchor="end">NO LAUNCH WINDOW LOST</text>
  </g>
</svg>
